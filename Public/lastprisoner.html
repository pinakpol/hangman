<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Last Prisoner</title>

<style>

body
{
    margin:0;
    padding:40px;

    background:#2b1d13;

    color:#f2dfb5;

    font-family:Georgia,serif;
}

#panel
{
    width:700px;

    margin:auto;

    background:#4a3823;

    border:4px solid #8d6b3c;

    padding:30px;

    box-shadow:0 0 30px black;
}

h1
{
    text-align:center;

    letter-spacing:3px;

    margin-top:0;
}

table
{
    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

td
{
    padding:10px;

    border-bottom:1px solid #7a613d;
}

.label
{
    font-weight:bold;

    width:220px;
}

.value
{
    text-align:right;

    color:white;
}

#result
{
    font-size:26px;

    font-weight:bold;

    text-align:center;

    padding-top:20px;
}

</style>

</head>

<body>

<div id="panel">

<h1>LAST PRISONER</h1>

<table>

<tr>

<td class="label">Prisoner</td>

<td class="value" id="player"></td>

</tr>

<tr>

<td class="label">Difficulty</td>

<td class="value" id="difficulty"></td>

</tr>

<tr>

<td class="label">Category</td>

<td class="value" id="category"></td>

</tr>

<tr>

<td class="label">Word</td>

<td class="value" id="word"></td>

</tr>

<tr>

<td class="label">Wrong Guesses</td>

<td class="value" id="wrong"></td>

</tr>

<tr>

<td class="label">Played</td>

<td class="value" id="played"></td>

</tr>

</table>

<div id="result"></div>

</div>

<script>

fetch("/lastprisoner")

.then(r=>r.json())

.then(data=>{

document.getElementById("player").innerText =
data.player;

document.getElementById("difficulty").innerText =
data.difficulty;

document.getElementById("category").innerText =
data.category;

document.getElementById("word").innerText =
data.word;

document.getElementById("wrong").innerText =
data.wrong;

document.getElementById("played").innerText =
new Date(data.played).toLocaleString();

let result =
document.getElementById("result");

if(data.result=="win")
{
    result.style.color="#6cff6c";

    result.innerText="✓ ROYAL PARDON";
}
else
{
    result.style.color="#ff6666";

    result.innerText="✗ SENTENCE CARRIED OUT";
}

});

</script>

</body>

</html>
