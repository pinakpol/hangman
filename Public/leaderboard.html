<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Leaderboard</title>

<style>

body{
background:#241b12;
color:#f3deb0;
font-family:Georgia;
padding:40px;
}

table{
width:800px;
margin:auto;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #755b31;
text-align:center;
}

th{
background:#6d5128;
}

h1{
text-align:center;
}

</style>

</head>

<body>

<h1>TOP PRISONERS</h1>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Player</th>
<th>Games</th>
<th>Pardons</th>
<th>Executions</th>

</tr>

</thead>

<tbody id="body">

</tbody>

</table>

<script>

fetch("/leaderboard")

.then(r=>r.json())

.then(rows=>{

let html="";

rows.forEach((p,index)=>{

html+=`

<tr>

<td>${index+1}</td>

<td>${p.player}</td>

<td>${p.games}</td>

<td>${p.wins}</td>

<td>${p.losses}</td>

</tr>

`;

});

document.getElementById("body").innerHTML=html;

});

</script>

</body>

</html>
