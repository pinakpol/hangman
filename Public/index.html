<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Hangman's Gallows</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="parchment">

<div class="seal">☠</div>

<h1>EXECUTION NOTICE</h1>

<h2>By Order of the Crown</h2>

<div class="line"></div>

<div class="section">

<label>Prisoner Status</label>

<div id="status">
AWAITING PRISONER
</div>

</div>

<div class="section">

<label>Crime</label>

<div id="category">
---
</div>

</div>

<div class="section">

<label>Evidence</label>

<div id="hint">
---
</div>

</div>

<div class="line"></div>

<div class="section">

<label>Sentence</label>

<div id="word">
_ _ _ _ _
</div>

</div>

<div class="line"></div>

<div class="section">

<label>Remaining Mercy</label>

<div id="attempts">
6 / 6
</div>

<div style="
width:100%;
height:14px;
border:1px solid #3b2411;
margin-top:8px;
">

<div id="bar"
style="
height:100%;
width:100%;
background:#5f8f3f;
">
</div>

</div>

</div>

<div class="section">

<label>Failed Testimony</label>

<div id="wrong">
None
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
